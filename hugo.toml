baseURL = "https://georgesmatar.space/"
enableRobotsTXT = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]

  [languages.en]
    weight       = 1
    languageCode = "en-ca"
    languageName = "English"
    contentDir   = "content/en"
    title        = "Georges Matar | Real Estate Broker"

    [languages.en.params]
      role        = "Real Estate Broker"
      tagline     = "Real Estate Broker &middot; Laval &amp; Montr&eacute;al"
