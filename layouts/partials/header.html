<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="container">
    <div class="nav__inner">
      <a href="{{ if eq .Lang "fr" }}/fr/{{ else }}/{{ end }}" class="nav__logo">
        <span class="nav__logo-name">{{ .Site.Params.name }}</span>
        <span class="nav__logo-title">{{ .Site.Params.role }} &middot; RE/MAX</span>
      </a>

      <button class="nav__toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav__menu" id="navMenu">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" class="nav__link {{ if eq .Name "Contact" }}nav__cta{{ end }}{{ if eq .Name "Me contacter" }}nav__cta{{ end }}">
            {{ .Name }}
          </a>
        </li>
        {{ end }}

        <li class="lang-switch">
          {{ if eq .Lang "fr" }}
            <a href="{{ .RelPermalink | replaceRE "^/fr" "" | default "/" }}" class="lang-btn" title="English">EN</a>
            <span class="lang-sep">/</span>
            <span class="lang-btn active">FR</span>
          {{ else }}
            <span class="lang-btn active">EN</span>
            <span class="lang-sep">/</span>
            <a href="/fr/" class="lang-btn" title="Français">FR</a>
          {{ end }}
        </li>
      </ul>
    </div>
  </div>
</nav>
