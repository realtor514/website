<section class="hero">
  <div class="container">
    <div class="hero__inner">

      <div class="hero__content">
        <div class="hero__badge">
          <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="4"/></svg>
          RE/MAX DU CARTIER INC.
        </div>

        <h1 class="hero__name">
          Georges<br><span>Matar</span>
        </h1>

        <p class="hero__title">Real Estate Broker &middot; Laval &amp; Montr&eacute;al</p>

        <p class="hero__tagline">
          &ldquo;Your trusted guide to the Greater Montreal<br>real estate market.&rdquo;
        </p>

        <div class="hero__actions">
          <a href="{{ "/listings/" | relURL }}" class="btn btn-primary">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            View Properties
          </a>
          <a href="#contact" class="btn btn-outline">Contact Me</a>
        </div>

        <div class="hero__stats">
          <div>
            <span class="hero__stat-number">5+</span>
            <span class="hero__stat-label">Years Experience</span>
          </div>
          <div>
            <span class="hero__stat-number">100+</span>
            <span class="hero__stat-label">Transactions</span>
          </div>
          <div>
            <span class="hero__stat-number">5&#9733;</span>
            <span class="hero__stat-label">Client Rating</span>
          </div>
        </div>
      </div>

      <div class="hero__photo-wrap">
        <div class="hero__photo-bg"></div>
        <img
          src="{{ "images/georges-matar.png" | relURL }}"
          alt="Georges Matar &mdash; Real Estate Broker"
          class="hero__photo"
          width="460"
          height="580"
        >
      </div>

    </div>
  </div>
</section>
