<section class="hero">
  <div class="container">
    <div class="hero__inner">

      <div class="hero__content">
        <div class="hero__badge">
          <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="4"/></svg>
          RE/MAX DU CARTIER INC.
        </div>

        <h1 class="hero__name">
          Georges<br><span>Matar</span>
        </h1>

        <p class="hero__title">{{ .Site.Params.tagline | safeHTML }}</p>

        <p class="hero__tagline">{{ .Site.Params.heroQuote | safeHTML }}</p>

        <div class="hero__actions">
          {{ $listingsURL := "/listings/" }}
          {{ if eq .Lang "fr" }}{{ $listingsURL = "/fr/listings/" }}{{ end }}
          <a href="{{ $listingsURL }}" class="btn btn-primary">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            {{ .Site.Params.ctaListings }}
          </a>
          <a href="#contact" class="btn btn-outline">{{ .Site.Params.ctaContact }}</a>
        </div>
      </div>

      <div class="hero__photo-wrap">
        <div class="hero__photo-bg"></div>
        <img
          src="{{ "images/georges-matar.png" | relURL }}"
          alt="Georges Matar - {{ .Site.Params.role }}"
          class="hero__photo"
          width="460"
          height="580"
        >
      </div>

    </div>
  </div>
</section>
