<!DOCTYPE html>
<html lang="{{ .Lang }}"{{ if eq .Lang "ar" }} dir="rtl"{{ end }}>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Georges Matar{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:title"       content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type"        content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url"         content="{{ .Permalink }}">
  {{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
<body>

{{ partial "header.html" . }}
<main>{{ block "main" . }}{{ end }}</main>
{{ partial "footer.html" . }}

<button class="scroll-top" id="scrollTop" aria-label="{{ if eq .Lang "fr" }}Retour en haut{{ else if eq .Lang "ar" }}العودة للأعلى{{ else if eq .Lang "es" }}Volver arriba{{ else }}Back to top{{ end }}">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<script>
  // ── Scroll progress bar ──
  const progressBar = document.createElement('div');
  progressBar.className = 'scroll-progress';
  document.body.prepend(progressBar);

  // ── Nav scroll effect ──
  const nav = document.querySelector('.nav');

  window.addEventListener('scroll', () => {
    nav.classList.toggle('nav--scrolled', window.scrollY > 40);
    const max = document.documentElement.scrollHeight - window.innerHeight;
    if (max > 0) progressBar.style.transform = `scaleX(${window.scrollY / max})`;
    scrollBtn.classList.toggle('visible', window.scrollY > 500);
  }, { passive: true });

  // ── Scroll to top ──
  const scrollBtn = document.getElementById('scrollTop');
  scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  // ── Reveal on scroll (base + left + right variants) ──
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => observer.observe(el));

  // ── Hero animated blobs ──
  (function () {
    const hero = document.querySelector('.hero');
    if (!hero) return;
    [1, 2].forEach(n => {
      const b = document.createElement('div');
      b.className = `hero__blob hero__blob--${n}`;
      hero.appendChild(b);
    });
  })();

  // ── Hero floating particles ──
  (function () {
    const hero = document.querySelector('.hero');
    if (!hero) return;
    const colors = ['rgba(255,18,0,.55)', 'rgba(0,67,255,.45)', 'rgba(255,255,255,.25)'];
    const sizes  = [3, 4, 5, 6];
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'hero__particle';
      const s = sizes[i % sizes.length];
      p.style.cssText = [
        `width:${s}px`, `height:${s}px`,
        `left:${Math.random() * 95}%`,
        `bottom:${Math.random() * 50}%`,
        `background:${colors[i % colors.length]}`,
        `animation-duration:${5 + Math.random() * 9}s`,
        `animation-delay:${Math.random() * 10}s`
      ].join(';');
      hero.appendChild(p);
    }
  })();

  // ── Stats counter animation ──
  (function () {
    const stats = document.querySelectorAll('.stat-item__number');
    if (!stats.length) return;
    const counterObs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const el = entry.target;
        if (el.dataset.counted) return;
        el.dataset.counted = '1';
        el.classList.add('animate');
        const raw = el.textContent.trim();
        const num = parseFloat(raw.replace(/[^0-9.]/g, ''));
        if (isNaN(num)) return;
        const suffix  = raw.replace(/[\d.]/g, '');
        const isFloat = raw.includes('.');
        const steps   = 55;
        let step = 0;
        const timer = setInterval(() => {
          step++;
          const eased = 1 - Math.pow(1 - step / steps, 3);
          const val   = eased * num;
          el.textContent = (isFloat ? val.toFixed(1) : Math.round(val)) + suffix;
          if (step >= steps) { clearInterval(timer); el.textContent = raw; }
        }, 1400 / steps);
      });
    }, { threshold: 0.6 });
    stats.forEach(el => counterObs.observe(el));
  })();

  // ── 3D tilt on service cards ──
  document.querySelectorAll('.service-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width  - .5;
      const y = (e.clientY - r.top)  / r.height - .5;
      card.style.transform = `perspective(900px) rotateY(${x * 9}deg) rotateX(${-y * 9}deg) translateZ(6px)`;
    });
    card.addEventListener('mouseleave', () => { card.style.transform = ''; });
  });

  // ── About photo slideshow ──
  (function () {
    const track = document.querySelector('.about-slideshow__track');
    const dots  = document.querySelectorAll('.about-slideshow__dot');
    if (!track || !dots.length) return;
    let current = 0;
    const total = dots.length;
    function goTo(idx) {
      current = idx;
      track.style.transform = `translateX(-${idx * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }
    dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.idx)));
    setInterval(() => goTo((current + 1) % total), 2000);
  })();

  // ── Mouse parallax in hero ──
  (function () {
    const hero    = document.querySelector('.hero');
    if (!hero) return;
    const content = hero.querySelector('.hero__content');
    const visual  = hero.querySelector('.hero__visual');
    let ticking   = false;
    hero.addEventListener('mousemove', e => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const r = hero.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - .5;
        const y = (e.clientY - r.top)  / r.height - .5;
        if (content) content.style.transform = `translate(${x * 10}px, ${y * 7}px)`;
        if (visual)  visual.style.transform  = `translate(${x * -13}px, ${y * -10}px)`;
        ticking = false;
      });
    });
    hero.addEventListener('mouseleave', () => {
      if (content) content.style.transform = '';
      if (visual)  visual.style.transform  = '';
    });
  })();
</script>

</body>
</html>
